<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>FINALISTS Contact Sheet</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 28px; font-family: Inter, Arial, sans-serif; background: #f4f1e8; color: #07140d; }
    h1 { margin: 0 0 8px; font-size: 30px; line-height: 1.05; letter-spacing: 0; }
    .lede { margin: 0 0 24px; color: #34483c; font-size: 14px; }
    .sheet { display: grid; gap: 28px; }
    .concept { background: #fff; border: 1px solid rgba(7,20,13,0.25); padding: 18px; }
    h2 { margin: 0 0 14px; font-size: 20px; letter-spacing: 0; }
    .pair { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    figure { margin: 0; }
    img { display: block; width: 100%; border: 1px solid rgba(7,20,13,0.18); }
    figcaption { margin-top: 7px; font-weight: 800; font-size: 12px; color: #34483c; text-transform: uppercase; letter-spacing: 0.08em; }
  </style>
</head>
<body>
  <h1>FINALISTS</h1>
  <p class="lede">Targeted Save Upgrade Tools v2 finalist from V2 01 Editorial Rule.</p>
  <main class="sheet">
    <section class="concept">
      <h2>01. Corrected Editorial Rule</h2>
      <div class="pair">
        <figure>
          <img src="SWW_YAPTOM_Finalists_01_corrected-editorial-rule_Front_Proof.png" alt="Corrected Editorial Rule front">
          <figcaption>Front</figcaption>
        </figure>
        <figure>
          <img src="SWW_YAPTOM_Finalists_01_corrected-editorial-rule_Back_Proof.png" alt="Corrected Editorial Rule back">
          <figcaption>Back</figcaption>
        </figure>
      </div>
    </section>
  </main>
</body>
</html>
